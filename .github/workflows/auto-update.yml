name: Update and publish to AUR

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          OLD_VER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          LATEST_TAG=$(curl -sL "https://api.github.com/repos/AkaraChen/aghub/releases/latest" | jq -r '.tag_name')
          NEW_VER="${LATEST_TAG#v}"
          echo "old_ver=$OLD_VER" >> "$GITHUB_OUTPUT"
          echo "new_ver=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Old: $OLD_VER -> New: $NEW_VER"

      - name: Update PKGBUILD
        if: steps.check.outputs.old_ver != steps.check.outputs.new_ver
        run: |
          NEW_VER=${{ steps.check.outputs.new_ver }}
          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD

          # Download new sources
          source PKGBUILD
          for s in "${source[@]}"; do
            url=$(echo "$s" | sed 's/.*:://')
            url_expanded=$(eval echo "$url")
            fname=$(basename "$url_expanded")
            [ -f "$fname" ] || curl -sLO "$url_expanded"
          done

          # Regenerate sha256sums
          SUMS=()
          for s in "${source[@]}"; do
            fname=$(basename "$s")
            SUMS+=("'$(sha256sum "$fname" | awk '{print $1}')'")
          done
          printf 'sha256sums=(%s)\n' "$(printf '%s\n' "${SUMS[@]}" | paste -sd' ')" > /tmp/sums_line
          sed -i "/^sha256sums=/,/)/c\\$(cat /tmp/sums_line)" PKGBUILD

          # Commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git commit -m "Update to v$NEW_VER"
          git push

      - name: Publish to AUR
        if: steps.check.outputs.old_ver != steps.check.outputs.new_ver
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: aghub-bin
          pkgbuild: ./PKGBUILD
          assets: aghub.desktop
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
