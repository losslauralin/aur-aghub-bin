name: Update and publish to AUR

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm git jq curl pacman-contrib

      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          OLD_VER=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)
          LATEST_TAG=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/AkaraChen/aghub/releases/latest" | jq -r '.tag_name')
          NEW_VER="${LATEST_TAG#v}"
          echo "old_ver=$OLD_VER" >> "$GITHUB_OUTPUT"
          echo "new_ver=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Old: $OLD_VER -> New: $NEW_VER"

      - name: Update PKGBUILD and .SRCINFO
        if: steps.check.outputs.old_ver != steps.check.outputs.new_ver
        run: |
          NEW_VER=${{ steps.check.outputs.new_ver }}

          # Update pkgver and reset pkgrel
          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # makepkg refuses to run as root, create a build user
          useradd -m builduser
          chown -R builduser:builduser .

          # Update checksums and regenerate .SRCINFO
          su builduser -c "updpkgsums"
          su builduser -c "makepkg --printsrcinfo > .SRCINFO"

          # Commit to GitHub repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v$NEW_VER"
          git push

  publish:
    needs: update
    if: needs.update.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: aghub-bin
          pkgbuild: ./PKGBUILD
          assets: aghub.desktop
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
